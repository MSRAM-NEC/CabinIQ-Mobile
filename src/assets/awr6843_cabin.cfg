% AWR6843 AOP / ISK — In-Cabin Occupancy Detection Profile
% Optimised for short-range cabin use (0.1m – 4.0m)
% Frame rate: 10 fps  |  Chirps: 128 per frame  |  3 TX, 4 RX (MIMO)
% Compatible with: People Counting Out-of-Box Demo firmware (SDK 3.x / 4.x)
%
% UART baud: Config port = 115200, Data port = 921600

sensorStop
flushCfg

% --- Platform ---
dfeDataOutputMode 1

% --- Channel & Antenna config ---
% 3 TX, 4 RX — enables virtual 12-antenna MIMO for azimuth + elevation
channelCfg 15 7 0

% --- ADC output ---
% 4 bytes/sample, complex 1x
adcCfg 2 1

% --- ADC buffer config ---
adcbufCfg -1 0 1 1 1

% --- Profile config ---
% profileId startFreq idleTime adcStartTime rampEndTime txOutPower txPhaseShifter freqSlopeConst txStartTime numAdcSamples adcSampleRate hpfCornerFreq1 hpfCornerFreq2 rxGain
profileCfg 0 60 7 6 57 0 0 56.11 1 256 6000 0 0 30

% --- Chirp config ---
% chirpStartIdx chirpEndIdx profileId startFreq freqSlope idleTime adcStartTime txEnable
chirpCfg 0 0 0 0 0 0 0 5
chirpCfg 1 1 0 0 0 0 0 6
chirpCfg 2 2 0 0 0 0 0 4

% --- Frame config ---
% chirpStartIdx chirpEndIdx numLoops framePeriodicity triggerSelect frameTriggerDelay
frameCfg 0 2 16 100 1 0

% --- Low-power mode ---
lowPower 0 0

% --- GUI monitor — output only detected objects & range profile ---
% [detected pts] [range profile] [noise profile] [range-azimuth] [range-Doppler] [stats]
guiMonitor -1 1 0 0 0 0 0

% --- CFAR threshold config ---
% procDirection averageMode CFARThreshold peakGroupingEn (0=disabled)
cfarCfg -1 0 2 16 8 4 0 15 1
cfarCfg -1 1 0 8 4 2 1 15 1

% --- Multi-object beam forming ---
multiObjBeamForming -1 1 0.5

% --- DC range signal removal (calibration) ---
calibDcRangeSig -1 0 -5 8 256

% --- Extended maximum velocity ---
extendedMaxVelocity -1 0

% --- Clutter removal ---
clutterRemoval -1 0

% --- Azimuth resolution config ---
aoaFovCfg -1 -90 90 -40 40

% --- Compressor config (requires SDK 3+) ---
% compRangeBinStepSize
% cqSatMonitor 0 3 5 121 0
% cqSigImgMonitor 0 127 4
% analogMonitor 0 0

% --- Point cloud density filter ---
% minSNR minRange maxRange minVelocity maxVelocity maxAzimuth maxElevation
% pointCloudCfg -1 0 50 0.4 0 5 -1 1 -1 1

% --- Start streaming ---
sensorStart
